<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="'Segoe UI', system-ui, sans-serif">
<defs>
  <style>
    .title { font-size: 18px; fill: #e0e0e0; font-weight: bold; }
    .subtitle { font-size: 11px; fill: #b0b0c0; }
    .node-title { font-size: 12px; fill: #e0e0e0; font-weight: bold; }
    .node-sub { font-size: 10px; fill: #c0d0e0; }
    .node-detail { font-size: 10px; fill: #b0b0c0; }
    .cluster-label { font-size: 10px; fill: #8888aa; font-weight: 600; letter-spacing: 0.5px; }
    .grid { stroke: #333355; stroke-width: 0.5; }
  </style>
  <marker id="arrAmber" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
    <polygon points="0 0, 8 3, 0 6" fill="#fbbf24" opacity="0.8"/>
  </marker>
  <marker id="arrEmerald" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
    <polygon points="0 0, 8 3, 0 6" fill="#34d399" opacity="0.8"/>
  </marker>
  <marker id="arrViolet" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
    <polygon points="0 0, 8 3, 0 6" fill="#a78bfa" opacity="0.8"/>
  </marker>
</defs>

<!-- Background -->
<rect width="900" height="480" fill="#1a1a2e" rx="8"/>

<!-- Subtle grid -->
<line x1="0" y1="60" x2="900" y2="60" class="grid"/>
<line x1="0" y1="170" x2="900" y2="170" class="grid"/>
<line x1="0" y1="340" x2="900" y2="340" class="grid"/>
<line x1="0" y1="460" x2="900" y2="460" class="grid"/>
<line x1="150" y1="50" x2="150" y2="480" class="grid" stroke-dasharray="2,8"/>
<line x1="450" y1="50" x2="450" y2="480" class="grid" stroke-dasharray="2,8"/>
<line x1="750" y1="50" x2="750" y2="480" class="grid" stroke-dasharray="2,8"/>

<!-- Title -->
<text x="450" y="28" class="title" text-anchor="middle">Resumo de Conceitos de IA</text>
<text x="450" y="44" class="subtitle" text-anchor="middle">Fonte: Estrutura derivada de resumo-ia.svg</text>

<!-- ═══ Cluster Backgrounds ═══ -->

<!-- Modelos Discriminativos -->
<rect x="30" y="175" width="250" height="115" rx="8" fill="rgba(6,78,59,0.08)" stroke="#34d399" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.6"/>
<text x="155" y="192" class="cluster-label" text-anchor="middle">MODELOS DISCRIMINATIVOS</text>

<!-- Sistemas Autônomos -->
<rect x="305" y="175" width="290" height="148" rx="8" fill="rgba(120,53,15,0.06)" stroke="#fbbf24" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.6"/>
<text x="450" y="192" class="cluster-label" text-anchor="middle">SISTEMAS AUTÔNOMOS</text>

<!-- Técnicas Específicas -->
<rect x="620" y="175" width="260" height="115" rx="8" fill="rgba(6,78,59,0.08)" stroke="#34d399" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.6"/>
<text x="750" y="192" class="cluster-label" text-anchor="middle">TÉCNICAS ESPECÍFICAS</text>

<!-- Tecnologias Habilitadoras -->
<rect x="30" y="345" width="855" height="118" rx="8" fill="rgba(76,29,149,0.06)" stroke="#a78bfa" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.6"/>
<text x="450" y="362" class="cluster-label" text-anchor="middle">TECNOLOGIAS HABILITADORAS</text>

<!-- ═══ NODES ═══ -->

<!-- IA Node (top center) — Agent/AI category -->
<rect x="340" y="60" width="220" height="68" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
<text x="450" y="82" class="node-title" text-anchor="middle">IA</text>
<text x="450" y="97" class="node-sub" text-anchor="middle">Inteligência Artificial</text>
<text x="450" y="115" class="node-detail" text-anchor="middle">Campo Geral</text>

<!-- LLM Node — Backend/Processing -->
<rect x="48" y="200" width="215" height="80" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
<text x="155" y="220" class="node-title" text-anchor="middle">LLM</text>
<text x="155" y="235" class="node-sub" text-anchor="middle">Language Model</text>
<text x="155" y="253" class="node-detail" text-anchor="middle">- Prevê tokens</text>
<text x="155" y="268" class="node-detail" text-anchor="middle">- Base p/ aplicações</text>

<!-- Agente Node — Agent/AI -->
<rect x="330" y="200" width="240" height="110" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
<text x="450" y="220" class="node-title" text-anchor="middle">Agente</text>
<text x="450" y="235" class="node-sub" text-anchor="middle">(LLM + Tools)</text>
<text x="450" y="254" class="node-detail" text-anchor="middle">- Percebe</text>
<text x="450" y="269" class="node-detail" text-anchor="middle">- Raciocina</text>
<text x="450" y="284" class="node-detail" text-anchor="middle">- Age</text>
<text x="450" y="299" class="node-detail" text-anchor="middle">- Lembra</text>

<!-- RAG Node — Backend/Processing -->
<rect x="643" y="200" width="215" height="80" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
<text x="750" y="220" class="node-title" text-anchor="middle">RAG</text>
<text x="750" y="235" class="node-sub" text-anchor="middle">Retrieval + Generation</text>
<text x="750" y="253" class="node-detail" text-anchor="middle">- Busca documentos</text>
<text x="750" y="268" class="node-detail" text-anchor="middle">- Injeta contexto</text>

<!-- Embedding Node — Database/Storage -->
<rect x="55" y="375" width="200" height="70" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
<text x="155" y="401" class="node-title" text-anchor="middle">Embedding</text>
<text x="155" y="418" class="node-sub" text-anchor="middle">Representação Vetorial</text>

<!-- Vector DB Node — Database/Storage -->
<rect x="380" y="375" width="140" height="70" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
<text x="450" y="401" class="node-title" text-anchor="middle">Vector DB</text>
<text x="450" y="418" class="node-sub" text-anchor="middle">Indexação</text>

<!-- Fine-tuning Node — Database/Storage -->
<rect x="680" y="375" width="150" height="70" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
<text x="755" y="401" class="node-title" text-anchor="middle">Fine-tuning</text>
<text x="755" y="418" class="node-sub" text-anchor="middle">Adaptação</text>

<!-- ═══ ARROWS ═══ -->

<!-- IA → LLM (amber, solid) -->
<line x1="385" y1="128" x2="208" y2="200" stroke="#fbbf24" stroke-width="1.5" opacity="0.7" marker-end="url(#arrAmber)"/>

<!-- IA → Agente (amber, solid) -->
<line x1="450" y1="128" x2="450" y2="200" stroke="#fbbf24" stroke-width="1.5" opacity="0.7" marker-end="url(#arrAmber)"/>

<!-- IA → RAG (amber, solid) -->
<line x1="515" y1="128" x2="692" y2="200" stroke="#fbbf24" stroke-width="1.5" opacity="0.7" marker-end="url(#arrAmber)"/>

<!-- LLM → Embedding (emerald, dashed) -->
<line x1="155" y1="280" x2="155" y2="375" stroke="#34d399" stroke-width="1.2" opacity="0.6" stroke-dasharray="5,3" marker-end="url(#arrEmerald)"/>

<!-- LLM → Vector DB (emerald, dashed) -->
<line x1="200" y1="280" x2="410" y2="375" stroke="#34d399" stroke-width="1.2" opacity="0.6" stroke-dasharray="5,3" marker-end="url(#arrEmerald)"/>

<!-- LLM → Fine-tuning (emerald, dashed) -->
<line x1="255" y1="280" x2="700" y2="375" stroke="#34d399" stroke-width="1.2" opacity="0.6" stroke-dasharray="5,3" marker-end="url(#arrEmerald)"/>

<!-- RAG → Vector DB (violet, dashed — RAG depends on vector search) -->
<path d="M700,280 C650,335 520,335 495,375" fill="none" stroke="#a78bfa" stroke-width="1.1" opacity="0.45" stroke-dasharray="4,3" marker-end="url(#arrViolet)"/>

</svg>