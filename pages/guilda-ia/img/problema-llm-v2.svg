<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 310" font-family="system-ui, -apple-system, sans-serif">

  <!-- 1. Input box -->
  <rect x="70" y="0" width="200" height="42" rx="10" fill="#282a3a" stroke="#7dd89a" stroke-width="2.5"/>
  <text x="170" y="16" text-anchor="middle" fill="#7dd89a" font-size="9" opacity="0.7">PERGUNTA</text>
  <text x="170" y="32" text-anchor="middle" fill="#eee" font-size="12" font-weight="bold">Quanto é 234 × 987?</text>

  <!-- Arrow 1→2 -->
  <path d="M 170 44 L 170 64" stroke="#666" stroke-width="2" fill="none"/>
  <polygon points="166,62 174,62 170,70" fill="#666"/>
  <text x="185" y="58" text-anchor="start" fill="#888" font-size="8">pergunta</text>

  <!-- 2. LLM box -->
  <rect x="95" y="74" width="150" height="46" rx="10" fill="#282a3a" stroke="#BB86FC" stroke-width="2.5"/>
  <text x="170" y="102" text-anchor="middle" fill="#BB86FC" font-size="15" font-weight="bold">LLM</text>

  <!-- Arrow 2→3 -->
  <path d="M 170 122 L 170 148" stroke="#666" stroke-width="2" fill="none"/>
  <polygon points="166,146 174,146 170,154" fill="#666"/>
  <text x="185" y="140" text-anchor="start" fill="#888" font-size="8">resposta</text>

  <!-- 3. Approximate output box (red emphasis) -->
  <rect x="50" y="158" width="240" height="46" rx="10" fill="#282a3a" stroke="#FF6B6B" stroke-width="2.5"/>
  <text x="170" y="176" text-anchor="middle" fill="#FF6B6B" font-size="9" opacity="0.7">SAÍDA DO LLM</text>
  <text x="170" y="194" text-anchor="middle" fill="#FF6B6B" font-size="14" font-weight="bold">~230000 (APROXIMADO!)</text>

  <!-- Arrow 3→comparison -->
  <path d="M 170 206 L 170 226" stroke="#666" stroke-width="2" fill="none"/>
  <polygon points="166,224 174,224 170,232" fill="#666"/>

  <!-- 4. Comparison area -->
  <!-- VS divider -->
  <rect x="40" y="236" width="260" height="68" rx="10" fill="#282a3a" stroke="#FFB033" stroke-width="2.5"/>

  <!-- Approximate value (left) -->
  <line x1="170" y1="242" x2="170" y2="298" stroke="#555" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="105" y="260" text-anchor="middle" fill="#FF6B6B" font-size="10" opacity="0.8">LLM estimou:</text>
  <text x="105" y="280" text-anchor="middle" fill="#FF6B6B" font-size="16" font-weight="bold">~230 000</text>

  <!-- Correct value (right) -->
  <text x="235" y="260" text-anchor="middle" fill="#7dd89a" font-size="10" opacity="0.8">Valor real:</text>
  <text x="235" y="280" text-anchor="middle" fill="#7dd89a" font-size="16" font-weight="bold">230 958</text>

  <!-- Difference badge -->
  <text x="170" y="300" text-anchor="middle" fill="#FFB033" font-size="8">difere em 958 ❌</text>

</svg>