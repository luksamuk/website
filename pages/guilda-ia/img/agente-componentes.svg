<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 230" font-family="system-ui, -apple-system, sans-serif">
  <!-- Dark background -->
  <rect width="340" height="230" fill="#1e1e2e" rx="10"/>

  <!-- AGENTE box -->
  <rect x="110" y="15" width="120" height="42" rx="10" fill="#282a3a" stroke="#7dd89a" stroke-width="2.5"/>
  <text x="170" y="42" text-anchor="middle" fill="#7dd89a" font-size="16" font-weight="bold">AGENTE</text>

  <!-- Arrows from AGENTE -->
  <path d="M 140 57 L 60 108" stroke="#BB86FC" stroke-width="1.5" fill="none"/>
  <polygon points="56,106 64,110 58,115" fill="#BB86FC"/>
  <path d="M 170 57 L 170 108" stroke="#FFB033" stroke-width="1.5" fill="none"/>
  <polygon points="166,110 174,110 170,120" fill="#FFB033"/>
  <path d="M 200 57 L 280 108" stroke="#FF6B9D" stroke-width="1.5" fill="none"/>
  <polygon points="278,106 286,110 284,116" fill="#FF6B9D"/>

  <!-- LLM -->
  <rect x="8" y="118" width="108" height="44" rx="10" fill="#282a3a" stroke="#BB86FC" stroke-width="2"/>
  <text x="62" y="138" text-anchor="middle" fill="#BB86FC" font-size="14" font-weight="bold">LLM</text>
  <text x="62" y="153" text-anchor="middle" fill="#888" font-size="10">(Cérebro)</text>

  <!-- MEMÓRIA -->
  <rect x="118" y="118" width="108" height="44" rx="10" fill="#282a3a" stroke="#FFB033" stroke-width="2"/>
  <text x="172" y="138" text-anchor="middle" fill="#FFB033" font-size="13" font-weight="bold">MEMÓRIA</text>
  <text x="172" y="153" text-anchor="middle" fill="#888" font-size="10">(Histórico)</text>

  <!-- SYSTEM PROMPT -->
  <rect x="228" y="118" width="108" height="44" rx="10" fill="#282a3a" stroke="#FF6B9D" stroke-width="2"/>
  <text x="282" y="136" text-anchor="middle" fill="#FF6B9D" font-size="12" font-weight="bold">SYSTEM</text>
  <text x="282" y="152" text-anchor="middle" fill="#FF6B9D" font-size="11" font-weight="bold">PROMPT</text>
</svg>