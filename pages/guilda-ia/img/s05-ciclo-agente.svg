<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 185" font-family="system-ui, -apple-system, sans-serif">
  
  <!-- NO background rect — transparent! -->
  
  <!-- System Prompt (dashed, above Agente) -->
  <rect x="162" y="0" width="100" height="16" rx="4" fill="none" stroke="#FF6B9D" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="212" y="12" text-anchor="middle" fill="#FF6B9D" font-size="8">System Prompt</text>
  <line x1="212" y1="18" x2="212" y2="22" stroke="#FF6B9D" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- 1. Usuário -->
  <rect x="0" y="26" width="105" height="46" rx="10" fill="#282a3a" stroke="#7dd89a" stroke-width="2.5"/>
  <text x="52" y="54" text-anchor="middle" fill="#7dd89a" font-size="14" font-weight="bold">❶ Usuário</text>

  <!-- Arrow 1→2 -->
  <path d="M 107 49 L 150 49" stroke="#666" stroke-width="2" fill="none"/>
  <polygon points="148,45 156,49 148,53" fill="#666"/>
  <text x="131" y="42" text-anchor="middle" fill="#888" font-size="8">msg</text>

  <!-- 2. Agente -->
  <rect x="160" y="26" width="105" height="46" rx="10" fill="#282a3a" stroke="#58C4DD" stroke-width="2.5"/>
  <text x="212" y="54" text-anchor="middle" fill="#58C4DD" font-size="14" font-weight="bold">❷ Agente</text>

  <!-- Arrow 2→3 -->
  <path d="M 267 49 L 310 49" stroke="#666" stroke-width="2" fill="none"/>
  <polygon points="308,45 316,49 308,53" fill="#666"/>
  <text x="291" y="42" text-anchor="middle" fill="#888" font-size="8">prompt</text>

  <!-- 3. LLM -->
  <rect x="325" y="26" width="95" height="46" rx="10" fill="#282a3a" stroke="#BB86FC" stroke-width="2.5"/>
  <text x="372" y="54" text-anchor="middle" fill="#BB86FC" font-size="15" font-weight="bold">❸ LLM</text>

  <!-- Bottom loop: LLM → Histórico -->
  <path d="M 372 74 L 372 139 L 275 139" stroke="#BB86FC" stroke-width="1.5" fill="none"/>
  <polygon points="277,135 277,143 267,139" fill="#FFB033"/>
  <text x="333" y="109" text-anchor="middle" fill="#888" font-size="8">resposta</text>

  <!-- 4. Histórico -->
  <rect x="155" y="116" width="115" height="46" rx="10" fill="#282a3a" stroke="#FFB033" stroke-width="2.5"/>
  <text x="212" y="144" text-anchor="middle" fill="#FFB033" font-size="13" font-weight="bold">❹ Histórico</text>

  <!-- Histórico → Agente (loop) -->
  <path d="M 155 139 L 107 139 L 107 49 L 158 49" stroke="#FFB033" stroke-width="1.5" fill="none"/>
  <polygon points="156,45 156,53 164,49" fill="#FFB033"/>
  <text x="95" y="96" text-anchor="middle" fill="#888" font-size="8" transform="rotate(-90 95 96)">contexto</text>

  <!-- 5. Return hint -->
  <text x="52" y="104" text-anchor="middle" fill="#7dd89a" font-size="9" opacity="0.6">❺ retorna</text>
</svg>