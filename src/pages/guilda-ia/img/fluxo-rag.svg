<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#12121e"/>
    </linearGradient>
    <linearGradient id="indexFlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7dd89a" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7dd89a" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="queryFlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#59c5ee" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#59c5ee" stop-opacity="0.05"/>
    </linearGradient>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7dd89a"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#59c5ee"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffb033"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#e8e8f0" font-size="18" font-weight="bold">Fluxo RAG</text>

  <!-- ===== INDEXING PIPELINE (top row, green) ===== -->
  <rect x="20" y="55" width="760" height="120" fill="url(#indexFlow)" rx="8" stroke="#7dd89a" stroke-opacity="0.3" stroke-width="1"/>
  <text x="35" y="78" fill="#7dd89a" font-size="12" font-weight="bold">📥 INDEXAÇÃO (uma vez)</text>

  <!-- Index nodes -->
  <g>
    <rect x="40" y="95" width="140" height="55" fill="#282a3a" stroke="#7dd89a" stroke-width="1.5" rx="6"/>
    <text x="110" y="120" text-anchor="middle" fill="#e8e8f0" font-size="13" font-weight="bold">Documento</text>
    <text x="110" y="138" text-anchor="middle" fill="#999" font-size="10">PDF, TXT, MD...</text>
  </g>
  <line x1="180" y1="122" x2="215" y2="122" stroke="#7dd89a" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <g>
    <rect x="220" y="95" width="120" height="55" fill="#282a3a" stroke="#7dd89a" stroke-width="1.5" rx="6"/>
    <text x="280" y="120" text-anchor="middle" fill="#e8e8f0" font-size="13" font-weight="bold">Chunks</text>
    <text x="280" y="138" text-anchor="middle" fill="#999" font-size="10">divide em pedaços</text>
  </g>
  <line x1="340" y1="122" x2="375" y2="122" stroke="#7dd89a" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <g>
    <rect x="380" y="95" width="120" height="55" fill="#282a3a" stroke="#7dd89a" stroke-width="1.5" rx="6"/>
    <text x="440" y="120" text-anchor="middle" fill="#e8e8f0" font-size="13" font-weight="bold">Embeddings</text>
    <text x="440" y="138" text-anchor="middle" fill="#999" font-size="10">texto → vetor</text>
  </g>
  <line x1="500" y1="122" x2="535" y2="122" stroke="#7dd89a" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <g>
    <rect x="540" y="95" width="140" height="55" fill="#282a3a" stroke="#7dd89a" stroke-width="1.5" rx="6"/>
    <text x="610" y="120" text-anchor="middle" fill="#e8e8f0" font-size="13" font-weight="bold">Vector Store</text>
    <text x="610" y="138" text-anchor="middle" fill="#999" font-size="10">FAISS, Chroma...</text>
  </g>

  <!-- ===== QUERY PIPELINE (bottom row, blue) ===== -->
  <rect x="20" y="200" width="760" height="145" fill="url(#queryFlow)" rx="8" stroke="#59c5ee" stroke-opacity="0.3" stroke-width="1"/>
  <text x="35" y="223" fill="#59c5ee" font-size="12" font-weight="bold">🔎 CONSULTA (a cada pergunta)</text>

  <g>
    <rect x="40" y="245" width="120" height="50" fill="#282a3a" stroke="#59c5ee" stroke-width="1.5" rx="6"/>
    <text x="100" y="268" text-anchor="middle" fill="#e8e8f0" font-size="13" font-weight="bold">Pergunta</text>
    <text x="100" y="284" text-anchor="middle" fill="#999" font-size="10">do usuário</text>
  </g>
  <line x1="160" y1="270" x2="195" y2="270" stroke="#59c5ee" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <g>
    <rect x="200" y="245" width="120" height="50" fill="#282a3a" stroke="#59c5ee" stroke-width="1.5" rx="6"/>
    <text x="260" y="268" text-anchor="middle" fill="#e8e8f0" font-size="13" font-weight="bold">Embedding</text>
    <text x="260" y="284" text-anchor="middle" fill="#999" font-size="10">pergunta → vetor</text>
  </g>
  <line x1="320" y1="270" x2="355" y2="270" stroke="#59c5ee" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <g>
    <rect x="360" y="245" width="130" height="50" fill="#282a3a" stroke="#59c5ee" stroke-width="1.5" rx="6"/>
    <text x="425" y="268" text-anchor="middle" fill="#e8e8f0" font-size="13" font-weight="bold">Busca similar</text>
    <text x="425" y="284" text-anchor="middle" fill="#999" font-size="10">cosseno / k-NN</text>
  </g>
  <line x1="490" y1="270" x2="525" y2="270" stroke="#59c5ee" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <g>
    <rect x="530" y="245" width="140" height="50" fill="#282a3a" stroke="#59c5ee" stroke-width="1.5" rx="6"/>
    <text x="600" y="268" text-anchor="middle" fill="#e8e8f0" font-size="13" font-weight="bold">Chunks relevantes</text>
    <text x="600" y="284" text-anchor="middle" fill="#999" font-size="10">top-k resultados</text>
  </g>

  <!-- Connection from Vector Store to Busca similar (the "lookup") -->
  <path d="M 610 150 L 610 180 L 425 180 L 425 245" fill="none" stroke="#7dd89a" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrowGreen)"/>
  <text x="500" y="195" text-anchor="middle" fill="#7dd89a" font-size="10" font-style="italic">busca no vector store</text>

  <!-- ===== LLM + RESPOSTA (bottom) ===== -->
  <line x1="600" y1="295" x2="600" y2="330" stroke="#59c5ee" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <g>
    <rect x="470" y="335" width="260" height="55" fill="#282a3a" stroke="#ffb033" stroke-width="1.5" rx="6"/>
    <text x="600" y="358" text-anchor="middle" fill="#e8e8f0" font-size="13" font-weight="bold">LLM</text>
    <text x="600" y="375" text-anchor="middle" fill="#999" font-size="10">recebe pergunta + chunks relevantes</text>
  </g>
  <line x1="600" y1="390" x2="600" y2="420" stroke="#ffb033" stroke-width="2" marker-end="url(#arrowAmber)"/>

  <g>
    <rect x="510" y="425" width="180" height="50" fill="#282a3a" stroke="#ffb033" stroke-width="1.5" rx="6"/>
    <text x="600" y="448" text-anchor="middle" fill="#e8e8f0" font-size="13" font-weight="bold">Resposta</text>
    <text x="600" y="464" text-anchor="middle" fill="#999" font-size="10">fundamentada nos documentos</text>
  </g>

  <!-- Pergunta feeds into LLM too -->
  <path d="M 100 295 L 100 362 L 470 362" fill="none" stroke="#59c5ee" stroke-width="1.5" stroke-dasharray="4 4" stroke-opacity="0.6"/>
  <text x="285" y="357" text-anchor="middle" fill="#59c5ee" font-size="10" font-style="italic" opacity="0.7">pergunta original</text>
</svg>