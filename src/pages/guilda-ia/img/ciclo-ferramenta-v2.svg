<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 185" font-family="system-ui, -apple-system, sans-serif">

  <!-- ❶ DESCRIÇÃO — green -->
  <rect x="0" y="10" width="90" height="108" rx="10" fill="#282a3a" stroke="#7dd89a" stroke-width="2.5"/>
  <text x="45" y="34" text-anchor="middle" fill="#7dd89a" font-size="13" font-weight="bold">❶</text>
  <text x="45" y="52" text-anchor="middle" fill="#7dd89a" font-size="11" font-weight="bold">DESCRIÇÃO</text>
  <text x="45" y="72" text-anchor="middle" fill="#ccc" font-size="8">Usuário envia</text>
  <text x="45" y="84" text-anchor="middle" fill="#ccc" font-size="8">ferramentas</text>
  <text x="45" y="96" text-anchor="middle" fill="#ccc" font-size="8">disponíveis</text>

  <!-- Arrow 1→2 -->
  <path d="M 94 64 L 108 64" stroke="#666" stroke-width="2" fill="none"/>
  <polygon points="106,60 114,64 106,68" fill="#666"/>

  <!-- ❷ ANÁLISE — cyan -->
  <rect x="116" y="10" width="90" height="108" rx="10" fill="#282a3a" stroke="#58C4DD" stroke-width="2.5"/>
  <text x="161" y="34" text-anchor="middle" fill="#58C4DD" font-size="13" font-weight="bold">❷</text>
  <text x="161" y="52" text-anchor="middle" fill="#58C4DD" font-size="11" font-weight="bold">ANÁLISE</text>
  <text x="161" y="72" text-anchor="middle" fill="#ccc" font-size="8">LLM analisa</text>
  <text x="161" y="84" text-anchor="middle" fill="#ccc" font-size="8">a pergunta e</text>
  <text x="161" y="96" text-anchor="middle" fill="#ccc" font-size="8">contexto</text>

  <!-- Arrow 2→3 -->
  <path d="M 210 64 L 224 64" stroke="#666" stroke-width="2" fill="none"/>
  <polygon points="222,60 230,64 222,68" fill="#666"/>

  <!-- ❸ DECISÃO — cyan -->
  <rect x="232" y="10" width="90" height="108" rx="10" fill="#282a3a" stroke="#58C4DD" stroke-width="2.5"/>
  <text x="277" y="34" text-anchor="middle" fill="#58C4DD" font-size="13" font-weight="bold">❸</text>
  <text x="277" y="52" text-anchor="middle" fill="#58C4DD" font-size="11" font-weight="bold">DECISÃO</text>
  <text x="277" y="72" text-anchor="middle" fill="#ccc" font-size="8">LLM decide</text>
  <text x="277" y="84" text-anchor="middle" fill="#ccc" font-size="8">qual ferramenta</text>
  <text x="277" y="96" text-anchor="middle" fill="#ccc" font-size="8">chamar</text>

  <!-- Arrow 3→4 -->
  <path d="M 326 64 L 340 64" stroke="#666" stroke-width="2" fill="none"/>
  <polygon points="338,60 346,64 338,68" fill="#666"/>

  <!-- ❹ EXECUÇÃO — purple -->
  <rect x="348" y="10" width="82" height="108" rx="10" fill="#282a3a" stroke="#BB86FC" stroke-width="2.5"/>
  <text x="389" y="34" text-anchor="middle" fill="#BB86FC" font-size="13" font-weight="bold">❹</text>
  <text x="389" y="52" text-anchor="middle" fill="#BB86FC" font-size="10" font-weight="bold">EXECUÇÃO</text>
  <text x="389" y="72" text-anchor="middle" fill="#ccc" font-size="8">Python</text>
  <text x="389" y="84" text-anchor="middle" fill="#ccc" font-size="8">executa o</text>
  <text x="389" y="96" text-anchor="middle" fill="#ccc" font-size="8">código</text>

  <!-- Arrow 4→5 -->
  <path d="M 434 64 L 448 64" stroke="#666" stroke-width="2" fill="none"/>
  <polygon points="446,60 454,64 446,68" fill="#666"/>

  <!-- ❺ RESPOSTA — amber -->
  <rect x="456" y="10" width="58" height="108" rx="10" fill="#282a3a" stroke="#FFB033" stroke-width="2.5"/>
  <text x="485" y="34" text-anchor="middle" fill="#FFB033" font-size="13" font-weight="bold">❺</text>
  <text x="485" y="54" text-anchor="middle" fill="#FFB033" font-size="9" font-weight="bold">RESPOSTA</text>
  <text x="485" y="72" text-anchor="middle" fill="#ccc" font-size="8">LLM</text>
  <text x="485" y="84" text-anchor="middle" fill="#ccc" font-size="8">formula</text>
  <text x="485" y="96" text-anchor="middle" fill="#ccc" font-size="8">resposta</text>

  <!-- Bottom: loopback arrow from ❺ back to ❶ -->
  <path d="M 485 120 L 485 160 L 45 160 L 45 122" stroke="#666" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>
  <polygon points="41,124 49,124 45,118" fill="#666"/>
  <text x="265" y="154" text-anchor="middle" fill="#888" font-size="8">repete se necessário</text>

</svg>