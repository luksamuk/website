<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 380" font-family="system-ui, -apple-system, sans-serif">

  <!-- 1. USUÁRIO — green -->
  <rect x="140" y="0" width="100" height="42" rx="10" fill="#282a3a" stroke="#7dd89a" stroke-width="2.5"/>
  <text x="190" y="26" text-anchor="middle" fill="#7dd89a" font-size="13" font-weight="bold">USUÁRIO</text>

  <!-- Arrow USUÁRIO → AGENTE -->
  <path d="M 190 44 L 190 66" stroke="#666" stroke-width="2" fill="none"/>
  <polygon points="186,64 194,64 190,72" fill="#666"/>
  <text x="204" y="58" text-anchor="start" fill="#888" font-size="8">msg</text>

  <!-- 2. AGENTE group box — cyan -->
  <rect x="30" y="76" width="320" height="110" rx="12" fill="#282a3a" stroke="#58C4DD" stroke-width="2.5"/>
  <text x="190" y="94" text-anchor="middle" fill="#58C4DD" font-size="12" font-weight="bold">AGENTE</text>

  <!-- LLM sub-box -->
  <rect x="50" y="104" width="120" height="64" rx="8" fill="#1e1e2e" stroke="#58C4DD" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="110" y="132" text-anchor="middle" fill="#58C4DD" font-size="14" font-weight="bold">LLM</text>
  <text x="110" y="150" text-anchor="middle" fill="#888" font-size="8">raciocínio + decisão</text>

  <!-- TOOL REGISTRY sub-box -->
  <rect x="210" y="104" width="120" height="64" rx="8" fill="#1e1e2e" stroke="#58C4DD" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="270" y="128" text-anchor="middle" fill="#58C4DD" font-size="12" font-weight="bold">TOOL</text>
  <text x="270" y="144" text-anchor="middle" fill="#58C4DD" font-size="12" font-weight="bold">REGISTRY</text>
  <text x="270" y="160" text-anchor="middle" fill="#888" font-size="8">schemas &amp; descrições</text>

  <!-- Internal arrow LLM → TOOL REGISTRY -->
  <path d="M 172 136 L 206 136" stroke="#58C4DD" stroke-width="1.5" fill="none"/>
  <polygon points="204,133 210,136 204,139" fill="#58C4DD"/>

  <!-- Arrow AGENTE → TOOL EXECUTOR -->
  <path d="M 190 188 L 190 218" stroke="#666" stroke-width="2" fill="none"/>
  <polygon points="186,216 194,216 190,224" fill="#666"/>
  <text x="204" y="208" text-anchor="start" fill="#888" font-size="8">call</text>

  <!-- 3. TOOL EXECUTOR — purple -->
  <rect x="90" y="228" width="200" height="38" rx="10" fill="#282a3a" stroke="#BB86FC" stroke-width="2.5"/>
  <text x="190" y="252" text-anchor="middle" fill="#BB86FC" font-size="13" font-weight="bold">TOOL EXECUTOR</text>

  <!-- Arrow TOOL EXECUTOR → TOOLS (fan out) -->
  <path d="M 110 268 L 55 308" stroke="#666" stroke-width="1.5" fill="none"/>
  <polygon points="53,304 51,310 59,310" fill="#666"/>

  <path d="M 155 268 L 138 308" stroke="#666" stroke-width="1.5" fill="none"/>
  <polygon points="136,304 134,310 142,310" fill="#666"/>

  <path d="M 190 268 L 190 308" stroke="#666" stroke-width="1.5" fill="none"/>
  <polygon points="186,306 194,306 190,314" fill="#666"/>

  <path d="M 225 268 L 242 308" stroke="#666" stroke-width="1.5" fill="none"/>
  <polygon points="240,304 238,310 246,310" fill="#666"/>

  <path d="M 270 268 L 325 308" stroke="#666" stroke-width="1.5" fill="none"/>
  <polygon points="323,304 321,310 329,310" fill="#666"/>

  <!-- Individual tool boxes — amber -->
  <!-- CALCULATE -->
  <rect x="5" y="314" width="90" height="36" rx="8" fill="#282a3a" stroke="#FFB033" stroke-width="2"/>
  <text x="50" y="337" text-anchor="middle" fill="#FFB033" font-size="10" font-weight="bold">CALCULATE</text>

  <!-- GET_TIME -->
  <rect x="100" y="314" width="78" height="36" rx="8" fill="#282a3a" stroke="#FFB033" stroke-width="2"/>
  <text x="139" y="337" text-anchor="middle" fill="#FFB033" font-size="10" font-weight="bold">GET_TIME</text>

  <!-- SEARCH -->
  <rect x="183" y="314" width="72" height="36" rx="8" fill="#282a3a" stroke="#FFB033" stroke-width="2"/>
  <text x="219" y="337" text-anchor="middle" fill="#FFB033" font-size="10" font-weight="bold">SEARCH</text>

  <!-- CODE -->
  <rect x="260" y="314" width="56" height="36" rx="8" fill="#282a3a" stroke="#FFB033" stroke-width="2"/>
  <text x="288" y="337" text-anchor="middle" fill="#FFB033" font-size="10" font-weight="bold">CODE</text>

  <!-- ... -->
  <rect x="321" y="314" width="40" height="36" rx="8" fill="#282a3a" stroke="#FFB033" stroke-width="2"/>
  <text x="341" y="337" text-anchor="middle" fill="#FFB033" font-size="12" font-weight="bold">…</text>

  <!-- Return arrow: TOOL EXECUTOR back up to AGENTE (right side loop) -->
  <path d="M 292 247 L 360 247 L 360 131 L 354 131" stroke="#666" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>
  <polygon points="356,128 356,134 350,131" fill="#666"/>
  <text x="365" y="190" text-anchor="start" fill="#888" font-size="8" transform="rotate(90 369 190)">resultado</text>

</svg>