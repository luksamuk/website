<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" font-family="'Segoe UI', system-ui, sans-serif">
  <!-- Background -->
  <rect width="960" height="440" rx="8" fill="#1a1a2e"/>
  
  <!-- Title -->
  <text x="480" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#e0e0e0">Técnicas de Prompting</text>
  
  <!-- Center node -->
  <rect x="390" y="50" width="180" height="36" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="480" y="73" text-anchor="middle" font-size="12" font-weight="bold" fill="#fbbf24">TÉCNICAS DE PROMPTING</text>
  
  <!-- === Básicas column (left) === -->
  <!-- Subtitle -->
  <text x="130" y="115" text-anchor="middle" font-size="11" fill="#34d399" font-weight="600">Básicas</text>
  
  <!-- Zero-shot -->
  <rect x="40" y="125" width="180" height="40" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1"/>
  <text x="130" y="143" text-anchor="middle" font-size="11" fill="#e0e0e0" font-weight="600">Zero-shot</text>
  <text x="130" y="158" text-anchor="middle" font-size="9" fill="#b0b0c0">Pedir sem exemplos</text>
  
  <!-- Few-shot -->
  <rect x="40" y="175" width="180" height="40" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1"/>
  <text x="130" y="193" text-anchor="middle" font-size="11" fill="#e0e0e0" font-weight="600">Few-shot</text>
  <text x="130" y="208" text-anchor="middle" font-size="9" fill="#b0b0c0">Dar exemplos antes</text>
  
  <!-- Role Prompting -->
  <rect x="40" y="225" width="180" height="40" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1"/>
  <text x="130" y="243" text-anchor="middle" font-size="11" fill="#e0e0e0" font-weight="600">Role Prompting</text>
  <text x="130" y="258" text-anchor="middle" font-size="9" fill="#b0b0c0">Atribuir um papel</text>
  
  <!-- Formatação -->
  <rect x="40" y="275" width="180" height="40" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1"/>
  <text x="130" y="293" text-anchor="middle" font-size="11" fill="#e0e0e0" font-weight="600">Formatação</text>
  <text x="130" y="308" text-anchor="middle" font-size="9" fill="#b0b0c0">Definir formato de saída</text>
  
  <!-- Arrows from center to básicas -->
  <line x1="390" y1="68" x2="220" y2="130" stroke="#34d399" stroke-width="1" opacity="0.5" marker-end="url(#arrowG)"/>
  
  <!-- === Avançadas column (center) === -->
  <text x="430" y="115" text-anchor="middle" font-size="11" fill="#22d3ee" font-weight="600">Avançadas</text>
  
  <!-- Chain-of-Thought -->
  <rect x="340" y="125" width="180" height="40" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1"/>
  <text x="430" y="143" text-anchor="middle" font-size="11" fill="#e0e0e0" font-weight="600">Chain-of-Thought</text>
  <text x="430" y="158" text-anchor="middle" font-size="9" fill="#b0b0c0">Pensar passo a passo</text>
  
  <!-- Tree-of-Thought -->
  <rect x="340" y="175" width="180" height="40" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1"/>
  <text x="430" y="193" text-anchor="middle" font-size="11" fill="#e0e0e0" font-weight="600">Tree-of-Thought</text>
  <text x="430" y="208" text-anchor="middle" font-size="9" fill="#b0b0c0">Explorar caminhos em paralelo</text>
  
  <!-- Self-Consistency -->
  <rect x="340" y="225" width="180" height="40" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1"/>
  <text x="430" y="243" text-anchor="middle" font-size="11" fill="#e0e0e0" font-weight="600">Self-Consistency</text>
  <text x="430" y="258" text-anchor="middle" font-size="9" fill="#b0b0c0">Votação entre respostas</text>
  
  <!-- Prompt Chaining -->
  <rect x="340" y="275" width="180" height="40" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1"/>
  <text x="430" y="293" text-anchor="middle" font-size="11" fill="#e0e0e0" font-weight="600">Prompt Chaining</text>
  <text x="430" y="308" text-anchor="middle" font-size="9" fill="#b0b0c0">Dividir tarefa em etapas</text>
  
  <!-- Arrows from center to avançadas -->
  <line x1="480" y1="86" x2="430" y2="125" stroke="#22d3ee" stroke-width="1" opacity="0.5"/>
  
  <!-- === Especializadas column (right) === -->
  <text x="730" y="115" text-anchor="middle" font-size="11" fill="#a78bfa" font-weight="600">Especializadas</text>
  
  <!-- RAG -->
  <rect x="640" y="125" width="180" height="40" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1"/>
  <text x="730" y="143" text-anchor="middle" font-size="11" fill="#e0e0e0" font-weight="600">RAG Prompting</text>
  <text x="730" y="158" text-anchor="middle" font-size="9" fill="#b0b0c0">Com contexto recuperado</text>
  
  <!-- Multimodal -->
  <rect x="640" y="175" width="180" height="40" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1"/>
  <text x="730" y="193" text-anchor="middle" font-size="11" fill="#e0e0e0" font-weight="600">Multimodal</text>
  <text x="730" y="208" text-anchor="middle" font-size="9" fill="#b0b0c0">Texto + imagem + áudio</text>
  
  <!-- Tool Use -->
  <rect x="640" y="225" width="180" height="40" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1"/>
  <text x="730" y="243" text-anchor="middle" font-size="11" fill="#e0e0e0" font-weight="600">Tool Use</text>
  <text x="730" y="258" text-anchor="middle" font-size="9" fill="#b0b0c0">Chamar ferramentas (APIs)</text>
  
  <!-- Conversational -->
  <rect x="640" y="275" width="180" height="40" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1"/>
  <text x="730" y="293" text-anchor="middle" font-size="11" fill="#e0e0e0" font-weight="600">Conversational</text>
  <text x="730" y="308" text-anchor="middle" font-size="9" fill="#b0b0c0">Diálogo com memória</text>
  
  <!-- Arrows from center to especializadas -->
  <line x1="570" y1="68" x2="640" y2="130" stroke="#a78bfa" stroke-width="1" opacity="0.5" marker-end="url(#arrowV)"/>
  
  <!-- Connecting line from center down to columns -->
  <path d="M 480 86 L 480 105" stroke="#e0e0e0" stroke-width="1" opacity="0.3"/>
  <path d="M 130 105 L 730 105" stroke="#e0e0e0" stroke-width="1" opacity="0.2"/>
  <path d="M 130 105 L 130 315" stroke="#34d399" stroke-width="1" opacity="0.2" stroke-dasharray="3,3"/>
  <path d="M 430 105 L 430 315" stroke="#22d3ee" stroke-width="1" opacity="0.2" stroke-dasharray="3,3"/>
  <path d="M 730 105 L 730 315" stroke="#a78bfa" stroke-width="1" opacity="0.2" stroke-dasharray="3,3"/>
  
  <!-- Legend -->
  <g transform="translate(40, 350)">
    <text x="0" y="0" font-size="10" fill="#b0b0c0" font-weight="600">Legenda:</text>
    <circle cx="80" cy="-4" r="5" fill="#34d399"/>
    <text x="90" y="0" font-size="9" fill="#b0b0c0">Básicas</text>
    <circle cx="160" cy="-4" r="5" fill="#22d3ee"/>
    <text x="170" y="0" font-size="9" fill="#b0b0c0">Avançadas</text>
    <circle cx="255" cy="-4" r="5" fill="#a78bfa"/>
    <text x="265" y="0" font-size="9" fill="#b0b0c0">Especializadas</text>
    <circle cx="370" cy="-4" r="5" fill="#fbbf24"/>
    <text x="380" y="0" font-size="9" fill="#b0b0c0">Centro</text>
  </g>
  
  <!-- Subtitle -->
  <text x="480" y="420" text-anchor="middle" font-size="9" fill="#b0b0c0" opacity="0.6">Aula 02 — Prompting Básico</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowG" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#34d399" opacity="0.7"/>
    </marker>
    <marker id="arrowC" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#22d3ee" opacity="0.7"/>
    </marker>
    <marker id="arrowV" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#a78bfa" opacity="0.7"/>
    </marker>
  </defs>
</svg>